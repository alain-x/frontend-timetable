<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Digital Timetable</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"; margin: 0; background: #0f172a; color: #e2e8f0; display: grid; place-items: center; min-height: 100dvh; }
      .card { max-width: 560px; padding: 24px; background: rgba(15,23,42,.6); border: 1px solid rgba(226,232,240,.08); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.35); }
      h1 { margin: 0 0 8px; font-size: 22px; }
      p { margin: 0 0 12px; color: #94a3b8; }
      .hint { font-size: 14px; color: #cbd5e1; }
      .row { display: flex; gap: 10px; margin-top: 16px; }
      a, button { appearance: none; border: 0; background: #0ea5e9; color: #0f172a; padding: 10px 14px; border-radius: 10px; font-weight: 600; text-decoration: none; }
      button.secondary { background: transparent; color: #e2e8f0; border: 1px solid rgba(226,232,240,.18); }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>You can still browse cached content. Some actions will queue and sync when you're back online.</p>
      <p class="hint">Try reconnecting or return to the app shell.</p>
      <div class="row">
        <a href="/">Back to app</a>
        <button class="secondary" onclick="location.reload()">Retry</button>
      </div>
    </div>
  </body>
</html>
